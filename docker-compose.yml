version: '3.8'

services:
  # MongoDB Service
  mongo:
    image: mongo:latest
    container_name: mongodb-1
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - floodguard_data:/data/db
    networks:
      - floodguard-network

  # Backend Service
  backend:
    build: ./backend
    container_name: backend-1
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb+srv://floodguard_user:Flood%4012345@cluster0.amcz5bw.mongodb.net/floodguard?appName=Cluster0
      - PORT=5000
      - JWT_SECRET=floodguard_secret_key_2026
    depends_on:
      - mongo
    networks:
      - floodguard-network

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: frontend-1
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - floodguard-network

volumes:
  floodguard_data:

networks:
  floodguard-network:
    driver: bridge
