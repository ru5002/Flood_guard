# Backend uses MongoDB Atlas: set MONGO_URI in backend/.env (mongodb+srv://...)
# Optional: override in repo-root .env. Twilio keys can stay in root .env.
# Later env_file entries override earlier ones for duplicate keys.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: floodguard-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    env_file:
      - .env
      - backend/.env
    environment:
      # PORT / PYTHON_PATH are fixed for the image; MONGO_URI, JWT, API keys come from env_file (.env + backend/.env).
      PORT: 5000
      PYTHON_PATH: /opt/venv/bin/python
      AUTO_ALERT_COOLDOWN_MINUTES: ${AUTO_ALERT_COOLDOWN_MINUTES:-360}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - floodguard-network

  frontend:
    build: ./frontend
    container_name: floodguard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floodguard-network

networks:
  floodguard-network:
    driver: bridge
